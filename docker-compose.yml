services:
  auth-service:
    build: ./auth-service
    ports:
      - "3001:3001"

  patient-service:
    build: ./patient-service
    ports:
      - "3002:3002"

  doctor-service:
    build: ./doctor-service
    ports:
      - "3003:3003"

  appointment-service:
    build: ./appointment-service
    ports:
      - "3004:3004"

  billing-service:
    build: ./billing-service
    ports:
      - "3005:3005"

  mongo:   # ✅ NOW CORRECT
    image: mongo
    ports:
      - "27018:27017"
  redis:
    image: redis
    ports:
      - "6379:6379"
  api-gateway:
    image: nginx
    ports:
    - "80:80"
    volumes:
    - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
    - auth-service
    - patient-service
    - doctor-service
    - appointment-service
    - billing-service